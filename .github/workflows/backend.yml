name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # -------------------------
      # Checkout Repository
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Setup Java
      # -------------------------
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # -------------------------
      # Build JAR
      # -------------------------
      - name: Build Jar
        working-directory: votum-backend
        run: mvn clean install -DskipTests

      # -------------------------
      # Login DockerHub
      # -------------------------
      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # -------------------------
      # Build Docker Image
      # -------------------------
      - name: Build Docker Image
        working-directory: votum-backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/votum-backend:latest .

      # -------------------------
      # Push Docker Image
      # -------------------------
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/votum-backend:latest

      # -------------------------
      # Deploy to EC2 (Reverse Proxy Architecture)
      # -------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/votum

            # Create Docker network if not exists
            docker network create votum-network || true

            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/votum-backend:latest

            # Stop and remove old container
            docker stop votum-backend || true
            docker rm votum-backend || true

            # Run backend WITHOUT exposing port publicly
            docker run -d \
              --name votum-backend \
              --restart always \
              --network votum-network \
              --env-file .env \
              -v votum-storage:/app/storage \
              ${{ secrets.DOCKER_USERNAME }}/votum-backend:latest

      # -------------------------
      # Send Email if Deployment Fails
      # -------------------------
      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚨 Backend Deployment Failed"
          body: |
            Backend deployment FAILED.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Triggered By: ${{ github.actor }}
            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}

            Please check GitHub Actions logs immediately.
          to: ${{ secrets.EMAIL_TO }}
          from: Votum Backend CI/CD
